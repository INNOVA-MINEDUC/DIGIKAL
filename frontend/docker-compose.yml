version: "4.0"

services:
  frontend:
    build: .
    container_name: mockup-portal-mineduc
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: https://ciudadania.mineduc.edu.gt/
      NODE_ENV: development
    command: npm run dev -- --host
