name: Frontend - Calidad del Código (CI)

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**' # Solo se ejecuta si hay cambios en la carpeta frontend
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Establece la carpeta de trabajo por defecto

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    # En el Frontend, ejecutar el "build" es una buena prueba de calidad básica
    # Verifica que no haya errores de sintaxis o importación
    - name: Verificar Build
      run: npm run build

    # Descomenta esto si agregas scripts de linting o testing
    # - name: Verificar Estilo (Lint)
    #   run: npm run lint
    
    # - name: Ejecutar Pruebas
    #   run: npm test
