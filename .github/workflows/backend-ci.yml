name: Backend Docker CI/CD

# Este workflow automatiza la construcción y publicación de la imagen de Docker
# en GitHub Container Registry (GHCR) cada vez que se suben cambios al backend.

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "backend/**"
      - "!backend/**/*.md"
      - "!backend/.gitignore"

env:
  REGISTRY: ghcr.io
  # El nombre de la imagen será: ghcr.io/usuario/repo-backend
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Determina el ambiente según la rama que disparó el workflow
      - name: Set environment config
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=development" >> $GITHUB_OUTPUT
          fi

      # PASO DE CONTROL: Generamos Timestamp y Short SHA
      - name: Generate custom identifiers
        id: vars
        run: |
          echo "TS=$(date +'%Y%m%d_%H%M')" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ESTRATEGIA DE TAGS: (Ambiente-latest, Ambiente-Timestamp-ShortSHA, CommitSHA)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.config.outputs.ENV_NAME }}-latest
            type=raw,value=${{ steps.config.outputs.ENV_NAME }}-${{ steps.vars.outputs.TS }}-${{ steps.vars.outputs.SHORT_SHA }}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Workflow Summary
        run: |
          echo "### Imagen publicada (Backend)" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ steps.config.outputs.ENV_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.config.outputs.ENV_NAME }}-${{ steps.vars.outputs.TS }}-${{ steps.vars.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Development Server
    needs: build-and-push
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest
    concurrency: deploy-development
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_IP }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          script: |
            cd /opt/public_html/DIGIKAL
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker compose exec -T backend npx sequelize-cli db:migrate
            docker image prune -a -f

  deploy-prod:
    name: Deploy to Production Server
    needs: build-and-push
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          port: ${{ secrets.PROD_SERVER_PORT }}
          script: |
            cd /opt/public_html/DIGIKAL
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker compose exec -T backend npx sequelize-cli db:migrate
            docker image prune -a -f
